---
swagger: "2.0"
info:
  description: "The Maribel Service is a private use service for the angular application\
    \ hosted in WO. This service allows the exchange of data between WO and Maribel\
    \ BackEnd thus the exposure of the desired data for the agent and allow him the\
    \ data management related to his sector"
  version: "1.11.1"
  title: "Maribel"
  contact:
    name: "Maribel Analysts"
    email: "Maribel-analysts@smals.be"
basePath: "/REST/socialmaribel/v1"
tags:
- name: "Attribution"
  description: "Informations related to the attribution that give the agent an overview\
    \ of the total number of attribution allowed to the employer for his request before\
    \ and after 2020  "
- name: "Intervention"
  description: "Informations related to the intervention that give the agent an overview\
    \ of the total given amount per employer and sector related to his attribution\
    \ and the declared DmfA"
- name: "AttributionType"
  description: "Informations related to the attribution that gives the agent a detailed\
    \ information about the attribution"
- name: "Employer"
  description: "Summary of some specific information related to an employer specific\
    \ to Social Maribel"
- name: "Summary"
  description: "A brief statement of the situation of attributions that an employer\
    \ is entitled to and the interventions that have been paid for him"
- name: "LegalAmount"
  description: "The legal maximum amounts that can be attributed per FTE per quarter"
- name: "RefData"
  description: "Reference data used in the Maribel application"
- name: "General"
  description: "General summary of all attributions of all employers"
- name: "Payment"
  description: "The sum of calculated interventions for each group of employers"
- name: "Volume"
  description: "Work volume for an employer"
- name: "CorrectionFiles"
  description: "Files containing intervention corrections"
- name: "Corrections"
  description: "Interventions having a correction"
- name: "Documentation"
- name: "Monitoring"
- name: "FinalCalculation"
  description: "Final yearly calculation"
schemes:
- "https"
paths:
  /summaries:
    get:
      tags:
      - "Summary"
      description: "Retrieve a summary of the attributions and interventions for an\
        \ employer"
      operationId: "getSummary"
      produces:
      - "application/json"
      parameters:
      - name: "enterpriseNumber"
        in: "query"
        description: "Enterprise number of the employer"
        required: true
        type: "integer"
        format: "int64"
        x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
      - name: "lang"
        in: "query"
        description: "Language for the results"
        required: false
        type: "string"
        enum:
        - "fr"
        - "nl"
      responses:
        200:
          description: "The requested resource was found or the requested resource\
            \ returns no content"
          schema:
            $ref: "#/definitions/EmployerSummary"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
  /employers/{enterpriseNumber}:
    get:
      tags:
      - "Employer"
      description: "Retrieve information about an employer"
      operationId: "getEmployer"
      produces:
      - "application/json"
      parameters:
      - name: "enterpriseNumber"
        in: "path"
        description: "Enterprise number of the employer"
        required: true
        type: "integer"
        format: "int64"
        x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
      - name: "lang"
        in: "query"
        description: "Language for the results"
        required: false
        type: "string"
        enum:
        - "fr"
        - "nl"
      responses:
        200:
          description: "The requested resource was found"
          schema:
            $ref: "#/definitions/Employer"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
    patch:
      tags:
      - "Employer"
      summary: "Update the Maribel specific information of an employer"
      description: "Update an employer using JSON Merge Patch. See https://tools.ietf.org/html/rfc7396."
      operationId: "updateEmployer"
      consumes:
      - "application/merge-patch+json"
      produces:
      - "application/json"
      parameters:
      - name: "enterpriseNumber"
        in: "path"
        description: "Enterprise number of the employer"
        required: true
        type: "integer"
        format: "int64"
        x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
      - in: "body"
        name: "patchEmDataValues"
        description: "Data to update"
        required: false
        schema:
          $ref: "#/definitions/MergePatch"
      responses:
        200:
          description: "OK"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        403:
          description: "Forbidden ressource"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        409:
          description: "Conflict Data"
          schema:
            $ref: "#/definitions/Problem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:update"
  /employers:
    post:
      tags:
      - "Employer"
      description: "Create a new employer"
      operationId: "createEmployer"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "createEmployerValues"
        description: "Data of the employer to create"
        required: false
        schema:
          $ref: "#/definitions/EmployerCreation"
      responses:
        201:
          description: "Created"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        403:
          description: "Forbidden ressource"
        409:
          description: "Employer already existing (problem.title = DUPLICATE)"
          schema:
            $ref: "#/definitions/Problem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:create"
  /attributions:
    get:
      tags:
      - "Attribution"
      description: "Method to retrieve the employer attributions"
      operationId: "getAttributions"
      produces:
      - "application/json"
      parameters:
      - name: "enterpriseNumber"
        in: "query"
        description: "Enterprise number of the employer"
        required: true
        type: "integer"
        format: "int64"
        x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
      - name: "sector"
        in: "query"
        description: "The sector for which to retrieve the attributions"
        required: false
        type: "string"
        default: "general"
        enum:
        - "general"
        - "hospital"
      - name: "lang"
        in: "query"
        description: "Language for the results"
        required: false
        type: "string"
        enum:
        - "fr"
        - "nl"
      - name: "page"
        in: "query"
        description: "The page to retrieve"
        required: false
        type: "integer"
        default: 1
        format: "int32"
      - name: "pageSize"
        in: "query"
        description: "Size of the page"
        required: false
        type: "integer"
        default: 20
        format: "int32"
      responses:
        200:
          description: "The requested resource was found or the requested resource\
            \ returns no content"
          schema:
            $ref: "#/definitions/EmployerAttributionCollection"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
    post:
      tags:
      - "Attribution"
      description: "Create a new attribution"
      operationId: "createAttribution"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "createEmpAttDataValues"
        description: "Data of the attribution to create"
        required: false
        schema:
          $ref: "#/definitions/EmployerAttributionCreationData"
      responses:
        201:
          description: "Created"
          headers:
            Location:
              type: "string"
              format: "uri"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        403:
          description: "Forbidden ressource"
        409:
          description: "Conflict Data"
          schema:
            $ref: "#/definitions/Problem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:create"
  /attributions/{id}:
    get:
      tags:
      - "Attribution"
      description: "Method to retrieve a specific attribution"
      operationId: "getAttributionByID"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the attribution"
        required: true
        type: "integer"
        format: "int64"
      - name: "lang"
        in: "query"
        description: "Language for the results"
        required: false
        type: "string"
        enum:
        - "fr"
        - "nl"
      responses:
        200:
          description: "The requested resource was found"
          schema:
            $ref: "#/definitions/EmployerAttribution"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
    patch:
      tags:
      - "Attribution"
      summary: "Update an attribution"
      description: "Update an attribution using JSON Merge Patch. See https://tools.ietf.org/html/rfc7396."
      operationId: "updateAttribution"
      consumes:
      - "application/merge-patch+json"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the attribution to update"
        required: true
        type: "integer"
        format: "int64"
      - in: "body"
        name: "patchEmpAttDataValues"
        description: "Data to update"
        required: false
        schema:
          $ref: "#/definitions/MergePatch"
      responses:
        200:
          description: "OK"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        403:
          description: "Forbidden ressource"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        409:
          description: "Conflict Data"
          schema:
            $ref: "#/definitions/Problem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:update"
  /interventions:
    get:
      tags:
      - "Intervention"
      description: "Method to retrieve information about interventions"
      operationId: "getInterventions"
      produces:
      - "application/json"
      parameters:
      - name: "enterpriseNumber"
        in: "query"
        description: "Enterprise number of an employer"
        required: false
        type: "integer"
        format: "int64"
        x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
      - name: "q"
        in: "query"
        description: "Value for a full text search on the name or the enterprise number\
          \ of an employer"
        required: false
        type: "string"
      - name: "sector"
        in: "query"
        description: "Get interventions for the specified sector"
        required: false
        type: "string"
        enum:
        - "general"
        - "hospital"
      - name: "administration"
        in: "query"
        description: "Get interventions for the specified administration"
        required: false
        type: "string"
        enum:
        - "nsso"
        - "pla"
      - name: "calculationDate"
        in: "query"
        description: "Get interventions calculated on the specified date"
        required: false
        type: "string"
        format: "date"
      - name: "transferDate"
        in: "query"
        description: "Get interventions for the specified transfer document Pia date"
        required: false
        type: "string"
        format: "date"
      - name: "interventionsType"
        in: "query"
        description: "Get interventions for the specified type"
        required: false
        type: "array"
        items:
          type: "string"
          enum:
          - "yearly"
          - "quarterly"
          - "quarterly_for_yearly"
          - "monthly"
        collectionFormat: "multi"
      - name: "year"
        in: "query"
        description: "Get interventions for the specified year"
        required: false
        type: "array"
        items:
          type: "integer"
        collectionFormat: "multi"
      - name: "quarter"
        in: "query"
        description: "Get interventions for the specified quarter"
        required: false
        type: "array"
        items:
          type: "integer"
        collectionFormat: "multi"
      - name: "month"
        in: "query"
        description: "Get interventions for the specified month"
        required: false
        type: "array"
        items:
          type: "integer"
        collectionFormat: "multi"
      - name: "status"
        in: "query"
        description: "Get interventions with the specified status"
        required: false
        type: "array"
        items:
          type: "string"
          enum:
          - "proposed"
          - "rejected"
          - "accepted"
          - "sent"
          - "proposed_to_agent"
          - "validated_by_agent"
          - "sent_to_employer"
          - "response_to_treat"
          - "validated_by_employer"
          - "sent_to_account"
          - "refused"
          - "ended"
        collectionFormat: "multi"
      - name: "finalCalculationId"
        in: "query"
        description: "Get interventions with a specified finalCalculationId"
        required: false
        type: "integer"
      - name: "yearlyInterventionId"
        in: "query"
        description: "Get interventions with a specified yearlyInterventionId"
        required: false
        type: "integer"
      - name: "details"
        in: "query"
        description: "Include details of the intervention"
        required: false
        type: "boolean"
        default: false
      - name: "lang"
        in: "query"
        description: "Language for the results"
        required: false
        type: "string"
        enum:
        - "fr"
        - "nl"
      - name: "page"
        in: "query"
        description: "The page to retrieve"
        required: false
        type: "integer"
        default: 1
        format: "int32"
      - name: "pageSize"
        in: "query"
        description: "Size of the page"
        required: false
        type: "integer"
        default: 20
        format: "int32"
      - name: "sort"
        in: "query"
        description: "Property to sort by (in descending order if prefixed with a\
          \ dash). By default sorted by last added and beginDate in ascending order"
        required: false
        type: "array"
        items:
          type: "string"
          enum:
          - "calculationDate"
          - "-calculationDate"
          - "sector"
          - "-sector"
          - "amount"
          - "-amount"
          - "periodicity"
          - "-periodicity"
          - "paymentDate"
          - "-paymentDate"
      responses:
        200:
          description: "Success Code"
          schema:
            $ref: "#/definitions/InterventionCollection"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
  /interventions/{id}:
    get:
      tags:
      - "Intervention"
      description: "Method to retrieve the details of a specific intervention"
      operationId: "getInterventionByID"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the intervention to retrieve"
        required: true
        type: "integer"
        format: "int64"
      responses:
        200:
          description: "The requested resource was found"
          schema:
            $ref: "#/definitions/InterventionDetails"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
    patch:
      tags:
      - "Intervention"
      summary: "Update an intervention"
      description: "Update an intervention using JSON Merge Patch. See https://tools.ietf.org/html/rfc7396."
      operationId: "updateIntervention"
      consumes:
      - "application/merge-patch+json"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the intervention to update"
        required: true
        type: "integer"
        format: "int64"
      - in: "body"
        name: "patchEmDataValues"
        description: "Data to update"
        required: false
        schema:
          $ref: "#/definitions/MergePatch"
      responses:
        200:
          description: "OK"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        403:
          description: "Forbidden ressource"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        409:
          description: "Conflict Data"
          schema:
            $ref: "#/definitions/Problem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:update"
  /interventions/{id}/simulate:
    post:
      tags:
      - "Intervention"
      description: "Method to simulate calculation of new amount"
      operationId: "simulateInterventionCalculation"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the intervention to retrieve"
        required: true
        type: "integer"
        format: "int64"
      - in: "body"
        name: "InputManualInterventionResults"
        description: "Interventions with manual FTE"
        required: false
        schema:
          $ref: "#/definitions/SimulateManualInterventionResults"
      responses:
        200:
          description: "The requested resource was found"
          schema:
            $ref: "#/definitions/OutputManualInterventionResults"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:update"
  /interventions/{id}/result:
    patch:
      tags:
      - "Intervention"
      description: "Method to calculate new amount and save"
      operationId: "saveInterventionCalculation"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the intervention to retrieve"
        required: true
        type: "integer"
        format: "int64"
      - in: "body"
        name: "InputManualInterventionResults"
        description: "Interventions with manual FTE"
        required: false
        schema:
          $ref: "#/definitions/SimulateManualInterventionResults"
      responses:
        200:
          description: "The requested resource was found"
          schema:
            $ref: "#/definitions/OutputManualInterventionResults"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:update"
  /interventions/{id}/reset:
    post:
      tags:
      - "Intervention"
      description: "Method to reset intervention result to initial fte and amount"
      operationId: "resetInterventionCalculation"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the intervention to retrieve"
        required: true
        type: "integer"
        format: "int64"
      responses:
        200:
          description: "Ok"
          schema:
            $ref: "#/definitions/InterventionResults"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:update"
  /interventions/{id}/dmfaDetails:
    get:
      tags:
      - "Intervention"
      description: "Method to retrieve the DmfA details of a specific intervention"
      operationId: "getDmfaDetailsForIntervention"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "ID of the intervention to retrieve DmfA details for"
        required: true
        type: "integer"
        format: "int64"
      - name: "page"
        in: "query"
        description: "The page to retrieve"
        required: false
        type: "integer"
        default: 1
        format: "int32"
      - name: "pageSize"
        in: "query"
        description: "Size of the page"
        required: false
        type: "integer"
        default: 20
        format: "int32"
      responses:
        200:
          description: "The requested resource was found"
          schema:
            $ref: "#/definitions/DmfADetailCollection"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
  /correctionFiles:
    post:
      tags:
      - "CorrectionFiles"
      description: "Upload the file containing intervention corrections"
      operationId: "insertCorrectionFiles"
      consumes:
      - "multipart/form-data"
      produces:
      - "application/json"
      parameters:
      - name: "excelFile"
        in: "formData"
        description: "File to upload"
        required: true
        type: "file"
      responses:
        201:
          $ref: "#/definitions/CorrectionFileUpload"
        403:
          description: "Forbidden ressource"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
        - "scope:rsz-onss:fundmanagement:maribel:create"
  /correctionFiles/{fileId}:
    get:
      tags:
      - "CorrectionFiles"
      description: "Download the file containing intervention corrections"
      operationId: "getCorrectionFiles"
      produces:
      - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
      parameters:
      - name: "fileId"
        in: "path"
        description: "File ID to retrieve the file"
        required: true
        type: "integer"
      responses:
        200:
          description: "File Found"
          schema:
            type: "file"
        403:
          description: "Forbidden ressource"
        404:
