          description: "The requested resource was found or the requested resource\
            \ returns no content"
          schema:
            $ref: "#/definitions/ReferenceDataTypeCollection"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
  /refData/{type}:
    get:
      tags:
      - "RefData"
      description: "Get the reference data of the specified type"
      operationId: "getReferenceData"
      produces:
      - "application/json"
      parameters:
      - name: "type"
        in: "path"
        description: "The type of reference data to retrieve"
        required: true
        type: "string"
      responses:
        200:
          description: "The requested resource was found or the requested resource\
            \ returns no content"
          schema:
            $ref: "#/definitions/ReferenceDataCollection"
        400:
          description: "Bad request"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        404:
          description: "The specified resource was not found"
          schema:
            $ref: "#/definitions/InvalidParamProblem"
        500:
          description: "Unexpected error"
          schema:
            $ref: "#/definitions/Problem"
      security:
      - oauth2:
        - "scope:rsz-onss:fundmanagement:maribel:consult"
  /health:
    get:
      tags:
      - "Monitoring"
      summary: "Check health of this REST API"
      description: "This resource is only available to supervision users"
      operationId: "healthCheck"
      produces:
      - "text/xml"
      parameters:
      - name: "type"
        in: "query"
        description: "Defines the which sanity checks must be ran"
        required: false
        type: "string"
        default: "default"
        enum:
        - "ping"
        - "default"
        - "deep"
      responses:
        default:
          description: "successful operation"
  /doc:
    get:
      tags:
      - "Documentation"
      description: "Returns the API documentation"
      operationId: "getDoc"
      produces:
      - "application/json"
      parameters: []
      responses:
        200:
          description: "successful operation"
          schema:
            type: "string"
  /doc/swagger.json:
    get:
      tags:
      - "Documentation"
      description: "Returns the API documentation in JSON Swagger format"
      operationId: "getJsonSwagger"
      produces:
      - "application/json"
      parameters: []
      responses:
        200:
          description: "successful operation"
          schema:
            type: "string"
  /doc/swagger.yaml:
    get:
      tags:
      - "Documentation"
      description: "Returns the API documentation in YAML Swagger format"
      operationId: "getSwagger"
      produces:
      - "application/json"
      parameters: []
      responses:
        200:
          description: "successful operation"
          schema:
            type: "string"
securityDefinitions:
  oauth2:
    type: "oauth2"
    authorizationUrl: "https://oauth-v5.socialsecurity.be/oauth2/authorize"
    flow: "implicit"
    scopes:
      scope:rsz-onss:fundmanagement:maribel:consult: "This scope allows to consult\
        \ the Social Maribel data"
      scope:rsz-onss:fundmanagement:maribel:create: "This scope allows to create,\
        \ consult and update the Social Maribel data"
      scope:rsz-onss:fundmanagement:maribel:update: "This scope allows to consult\
        \ and update the Social Maribel data"
definitions:
  EmployerSummary:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/EmployerSectorSummary"
    description: "Summary of the attributions and interventions for an employer"
  EmployerSectorSummary:
    type: "object"
    required:
    - "sector"
    properties:
      sector:
        $ref: "#/definitions/Sector"
      attributionQuarterSummary:
        $ref: "#/definitions/EmployerAttributionQuarterSummary"
      interventionSummary:
        $ref: "#/definitions/EmployerInterventionSummary"
    description: "Summary of the attributions and interventions for a specific sector"
  EmployerAttributionQuarterSummary:
    type: "object"
    required:
    - "attributions"
    - "quarter"
    - "totalAmount"
    properties:
      quarter:
        type: "integer"
        format: "int32"
      totalAmount:
        type: "integer"
        format: "int64"
      attributions:
        type: "array"
        items:
          $ref: "#/definitions/Attribution"
    description: "Summary of the attributions for a quarter"
  Attribution:
    type: "object"
    required:
    - "assignedAmount"
    - "fte"
    - "month"
    properties:
      month:
        type: "integer"
        format: "int32"
      fte:
        type: "number"
      assignedAmount:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
    description: "An attribution for a specific month"
  EmployerInterventionSummary:
    type: "object"
    required:
    - "amount"
    - "periodicity"
    - "transferDate"
    - "type"
    properties:
      periodicity:
        type: "integer"
        format: "int32"
      yearlyInterventionId:
        type: "integer"
        format: "int32"
        description: "ID of the yearly intervention type linked to the quarterly_for_yearly."
      finalCalculationId:
        type: "integer"
        format: "int32"
        description: "ID of a final yearly calculation."
      amount:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      type:
        $ref: "#/definitions/InterventionType"
      transferDate:
        type: "string"
        format: "date"
    description: "Summary of the most recent intervention for an employer"
  Employer:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - $ref: "#/definitions/EmployerBasicInfo"
    description: "Information about an employer"
  EmployerBasicInfo:
    type: "object"
    required:
    - "administration"
    - "enterpriseDenomination"
    - "enterpriseNumber"
    - "region"
    properties:
      enterpriseDenomination:
        type: "string"
      enterpriseNumber:
        type: "integer"
        format: "int64"
        x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
      administration:
        $ref: "#/definitions/Administration"
      region:
        $ref: "#/definitions/Region"
      bankAccount:
        type: "string"
        x-smalsValidationClassName: "be.smals.validation.constraints.various.bankaccount.IbanBankAccount"
      prePayment:
        type: "boolean"
      bankAccountHistory:
        type: "array"
        items:
          $ref: "#/definitions/BankAccountHistory"
    description: "Some basic information about an employer"
  BankAccountHistory:
    allOf:
    - type: "object"
      required:
      - "bankAccount"
      - "modifiedDate"
      - "user"
      properties:
        bankAccount:
          type: "string"
        prepayment:
          type: "boolean"
        modifiedDate:
          type: "string"
          format: "date"
        user:
          $ref: "#/definitions/User"
      description: "The historical bank account for a specific employer"
  User:
    allOf:
    - type: "object"
      required:
      - "userId"
      properties:
        userId:
          type: "string"
        firstName:
          type: "string"
        lastName:
          type: "string"
      description: "Information about the Maribel user"
  EmployerCreation:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      properties:
        enterpriseNumber:
          type: "integer"
          format: "int64"
          x-smalsValidationClassName: "be.smals.validation.constraints.socialsecurity.CompanyId"
        bankAccount:
          type: "string"
          x-smalsValidationClassName: "be.smals.validation.constraints.various.bankaccount.IbanBankAccount"
        prePayment:
          type: "boolean"
      description: "Information needed for the creation of a employer"
  EmployerAttributionCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      - "pageSize"
      - "total"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/EmployerAttribution"
        pageSize:
          type: "integer"
          format: "int32"
        total:
          type: "integer"
          format: "int64"
      description: "The attributions for a specific employer"
    - $ref: "#/definitions/PageLinks"
  EmployerAttribution:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "beginDate"
      - "employeeType"
      - "fte"
      - "id"
      - "reason"
      - "sector"
      - "workplaceType"
      properties:
        id:
          type: "integer"
          format: "int64"
        sector:
          $ref: "#/definitions/Sector"
        workplaceType:
          $ref: "#/definitions/WorkplaceType"
        employeeType:
          $ref: "#/definitions/EmployeeType"
        fte:
          type: "number"
        remarks:
          type: "string"
        reason:
          type: "integer"
          format: "int32"
        beginDate:
          type: "string"
          format: "date"
        endDate:
          type: "string"
          format: "date"
        dueDate:
          type: "string"
          format: "date"
    description: "An attribution for an employer"
  EmployerAttributionCreationData:
    type: "object"
    required:
    - "beginDate"
    - "employeeType"
    - "enterpriseNumber"
    - "fte"
    - "reason"
    - "sector"
    - "workplaceType"
    properties:
      enterpriseNumber:
        type: "integer"
        format: "int64"
      fte:
        type: "number"
      remarks:
        type: "string"
      reason:
        type: "integer"
        format: "int32"
      beginDate:
        type: "string"
        format: "date"
      endDate:
        type: "string"
        format: "date"
      dueDate:
        type: "string"
        format: "date"
      sector:
        $ref: "#/definitions/Sector"
      workplaceType:
        $ref: "#/definitions/WorkplaceType"
      employeeType:
        $ref: "#/definitions/EmployeeType"
    description: "Data to create an attribution for an employer"
    example:
      reason: 1
      beginDate: "2000-01-23"
      employeeType: {}
      enterpriseNumber: 0
      endDate: "2000-01-23"
      fte: 6.02745618307040320615897144307382404804229736328125
      dueDate: "2000-01-23"
      workplaceType: {}
      sector: {}
      remarks: "remarks"
  InterventionDetails:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - $ref: "#/definitions/InterventionSummary"
    - type: "object"
      required:
      - "attributionTypes"
      - "interventionResults"
      properties:
        attributionTypes:
          type: "array"
          items:
            $ref: "#/definitions/AttributionTypeSummary"
        interventionResults:
          type: "array"
          items:
            $ref: "#/definitions/InterventionResults"
      description: "Details of a specific intervention"
  InterventionCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      - "pageSize"
      - "total"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/InterventionDetails"
        pageSize:
          type: "integer"
          format: "int32"
        total:
          type: "integer"
          format: "int64"
      description: "A collection of interventions"
    - $ref: "#/definitions/PageLinks"
  InterventionSummary:
    type: "object"
    required:
    - "amount"
    - "calculationDate"
    - "employerInfo"
    - "id"
    - "legacy"
    - "periodicity"
    - "status"
    - "type"
    properties:
      id:
        type: "integer"
        format: "int64"
      yearlyInterventionId:
        type: "integer"
        format: "int64"
      finalCalculationId:
        type: "integer"
        format: "int64"
      finalYearlyBalance:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 1000000000000
        exclusiveMinimum: true
      sector:
        $ref: "#/definitions/Sector"
      status:
        $ref: "#/definitions/InterventionStatus"
      periodicity:
        type: "integer"
        format: "int32"
      manualAmount:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      amount:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 1000000000000
        exclusiveMinimum: true
      paidAmount:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 1000000000000
        exclusiveMinimum: true
      receivedAmount:
        type: "integer"
        format: "int64"
        description: "In the case of a yearly intervention, the amount already received"
        minimum: 0
        maximum: 1000000000000
        exclusiveMinimum: true
      calculationDate:
        type: "string"
        format: "date"
      type:
        $ref: "#/definitions/InterventionType"
      paymentDate:
        type: "string"
        format: "date"
      employerInfo:
        $ref: "#/definitions/EmployerBasicInfo"
      legacy:
        type: "boolean"
    description: "Summary of an intervention"
  InterventionResults:
    type: "object"
    required:
    - "amountDemanded"
    - "amountFinanced"
    - "calculationDate"
    - "employeeTypes"
    - "fteDemanded"
    - "fteFinanced"
    - "quarter"
    - "sector"
    - "workplaceType"
    properties:
      quarter:
        type: "integer"
        format: "int32"
      interventionResultId:
        type: "integer"
        format: "int32"
        description: "ID of the interventionResult"
      calculationDate:
        type: "string"
        format: "date"
      amountDemanded:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      amountFinanced:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      amountFromManualFte:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      fteDemanded:
        type: "number"
      fteFinanced:
        type: "number"
      fteManual:
        type: "number"
      manual_creation:
        type: "boolean"
      user_id:
        type: "string"
      sector:
        $ref: "#/definitions/Sector"
      workplaceType:
        $ref: "#/definitions/WorkplaceType"
      employeeTypes:
        $ref: "#/definitions/EmployeeTypes"
    description: "Quarterly intervention results"
    example:
      amountDemanded: 1465812980502
      manual_creation: true
      amountFromManualFte: 5637376656633
      fteFinanced: 7.061401241503109105224211816675961017608642578125
      employeeTypes: {}
      calculationDate: "2000-01-23"
      fteManual: 9.301444243932575517419536481611430644989013671875
      interventionResultId: 6
      amountFinanced: 5962133916683
      user_id: "user_id"
      fteDemanded: 2.3021358869347654518833223846741020679473876953125
      workplaceType: {}
      sector: {}
      quarter: 0
  InputManualInterventionResults:
    type: "object"
    required:
    - "employeeTypes"
    - "fteManual"
    - "workplaceType"
    properties:
      fteManual:
        type: "number"
      workplaceType:
        $ref: "#/definitions/WorkplaceType"
      employeeTypes:
        $ref: "#/definitions/EmployeeTypes"
    description: "Input Manual intervention results"
  OutputManualInterventionResults:
    type: "object"
    required:
    - "interventionManualAmount"
    properties:
      interventionManualAmount:
        type: "integer"
        format: "int64"
      interventionResults:
        type: "array"
        items:
          $ref: "#/definitions/SimulateOutputInterventionResults"
    description: "Output Manual intervention results"
    example:
      interventionResults:
      - interventionResultId: 1
        amountDemanded: 5962133916683
        amountFinanced: 5637376656633
        amountFromManualFte: 2302135886934
        fteDemanded: 7.061401241503109105224211816675961017608642578125
        fteFinanced: 9.301444243932575517419536481611430644989013671875
        workplaceType: {}
        employeeTypes: {}
        calculationDate: "2000-01-23"
        fteManual: 3.61607674925191080461672754609026014804840087890625
        sector: {}
        quarter: 6
      - interventionResultId: 1
        amountDemanded: 5962133916683
        amountFinanced: 5637376656633
        amountFromManualFte: 2302135886934
        fteDemanded: 7.061401241503109105224211816675961017608642578125
        fteFinanced: 9.301444243932575517419536481611430644989013671875
        workplaceType: {}
        employeeTypes: {}
        calculationDate: "2000-01-23"
        fteManual: 3.61607674925191080461672754609026014804840087890625
        sector: {}
        quarter: 6
      interventionManualAmount: 0
  SimulateOutputInterventionResults:
    type: "object"
    required:
    - "amountDemanded"
    - "amountFinanced"
    - "calculationDate"
    - "employeeTypes"
    - "fteDemanded"
    - "fteFinanced"
    - "fteManual"
    - "quarter"
    - "sector"
    - "workplaceType"
    properties:
      quarter:
        type: "integer"
        format: "int32"
      interventionResultId:
        type: "integer"
        format: "int32"
        description: "ID of the interventionResult"
      calculationDate:
        type: "string"
        format: "date"
      amountDemanded:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      amountFinanced:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      amountFromManualFte:
        type: "integer"
        format: "int64"
        minimum: 0
        maximum: 10000000000000
        exclusiveMinimum: true
      fteDemanded:
        type: "number"
      fteFinanced:
        type: "number"
      fteManual:
        type: "number"
      sector:
        $ref: "#/definitions/Sector"
      workplaceType:
        $ref: "#/definitions/WorkplaceType"
      employeeTypes:
        $ref: "#/definitions/EmployeeTypes"
    description: "Quarterly intervention results"
    example:
      interventionResultId: 1
      amountDemanded: 5962133916683
      amountFinanced: 5637376656633
      amountFromManualFte: 2302135886934
      fteDemanded: 7.061401241503109105224211816675961017608642578125
      fteFinanced: 9.301444243932575517419536481611430644989013671875
      workplaceType: {}
      employeeTypes: {}
      calculationDate: "2000-01-23"
      fteManual: 3.61607674925191080461672754609026014804840087890625
      sector: {}
      quarter: 6
  DmfADetailCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      - "pageSize"
      - "total"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/DmfADetail"
        pageSize:
          type: "integer"
          format: "int32"
        total:
          type: "integer"
          format: "int64"
      description: "Collection of DmfA details used to calculate an intervention"
    - $ref: "#/definitions/PageLinks"
  DmfADetail:
    type: "object"
    required:
    - "employerContribution"
    - "occStartDate"
    - "occVolume"
    - "pensionContribution"
    - "remunerationSum"
    - "unemploymentContribution"
    - "workerCode"
    properties:
      workerSsin:
        type: "integer"
        format: "int64"
      workerName:
        type: "string"
      workerCode:
        type: "integer"
        format: "int32"
      occStartDate:
        type: "string"
        format: "date"
      occEndDate:
        type: "string"
        format: "date"
      newPostDate:
        type: "string"
        format: "date"
      subsidizedMeanWH:
        type: "integer"
        format: "int32"
      referenceMeanWH:
        type: "integer"
        format: "int32"
      meanWH:
        type: "integer"
        format: "int32"
      occVolume:
        type: "number"
      remunerationSum:
        type: "integer"
        format: "int64"
      employerContribution:
        type: "integer"
        format: "int64"
      unemploymentContribution:
        type: "integer"
        format: "int64"
      pensionContribution:
        type: "integer"
        format: "int64"
  AttributionTypeCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/AttributionTypeInfo"
      title: "AttributionType"
      description: "Get all detailed attributions related to the employer"
  AttributionTypeInfo:
    allOf:
    - $ref: "#/definitions/AttributionQuarterlySummary"
    - type: "object"
      required:
      - "attributions"
      properties:
        attributions:
          type: "array"
          items:
            $ref: "#/definitions/AttributionTypeSummary"
  AttributionQuarterlySummary:
    type: "object"
    required:
    - "quarter"
    - "sector"
    - "totalAmount"
    properties:
      quarter:
        type: "integer"
        format: "int32"
      sector:
        $ref: "#/definitions/Sector"
      totalAmount:
        type: "integer"
        format: "int64"
  AttributionTypeSummary:
    allOf:
    - $ref: "#/definitions/Attribution"
    - type: "object"
      required:
      - "employeeType"
      - "workplaceType"
      properties:
        workplaceType:
          $ref: "#/definitions/WorkplaceType"
        employeeType:
          $ref: "#/definitions/EmployeeType"
  ReferenceDataTypeCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/ReferenceDataType"
      description: "A collection of reference data types"
  ReferenceDataType:
    allOf:
    - $ref: "#/definitions/HttpLink"
    - type: "object"
      required:
      - "name"
      properties:
        name:
          type: "string"
      description: "A reference data type with a link to retrieve the reference data\
        \ of this type"
  ReferenceDataCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/ReferenceData"
      description: "A collection of reference data of a specific type"
  ReferenceData:
    allOf:
    - $ref: "#/definitions/LocalizedString"
    - type: "object"
      required:
      - "id"
      properties:
        id:
          type: "integer"
          format: "int32"
  LegalAmountCollection:
    allOf:
    - $ref: "#/definitions/SelfLink"
    - type: "object"
      required:
      - "items"
      properties:
        items:
          type: "array"
          items:
            $ref: "#/definitions/LegalAmount"
      title: "Legal amounts"
      description: "A collection of legal amounts"
  LegalAmount:
    type: "object"
    required:
    - "administration"
    - "amount"
    - "beginDate"
    - "employeeType"
    - "sector"
    - "workplaceType"
    properties:
      workplaceType:
        $ref: "#/definitions/WorkplaceType"
      beginDate:
        type: "string"
        format: "date"
      endDate:
        type: "string"
        format: "date"
        readOnly: true
      employeeType:
        $ref: "#/definitions/EmployeeType"
      administration:
        $ref: "#/definitions/Administration"
      sector:
        $ref: "#/definitions/Sector"
      amount:
        type: "integer"
        format: "int64"
    description: "A legal maximum amount that can be attributed for an FTE per quarter"
  LegalAmountsCreationData:
    type: "array"
    items:
      $ref: "#/definitions/LegalAmount"
  GeneralSummary:
    allOf:
    - $ref: "#/definitions/SelfLink"
