extends: [[spectral:oas, all]]

parserOptions:
  duplicateKeys: warn # error is the default value
  incompatibleValues: off # error is the default value

documentationUrl: https://www.gcloud.belgium.be/rest/  

rules:
  oas2-valid-schema-example: false
  
  rule_4-camelCase:
    description: URI notation MUST use lowerCamelCase
    type: style
    documentationUrl: https://www.gcloud.belgium.be/rest/#resources-uri  
    message: "{{property}} is not camel-case: {{error}}"
    given: "$.paths[*]~"
    severity: error
    then:
      function: pattern
      functionOptions:
        match: "^\/[a-z0-9]+([A-Z]?[a-z0-9]+)*(\/\7b?[a-z0-9]+([A-Z]?[a-z0-9]+)*\7d?)*\/?$"

        # work  ^\2f[a-z0-9]+([A-Z]?[a-z0-9]+)*(\2f\7b?[a-z0-9]+([A-Z]?[a-z0-9]+)*\7d?)*$
        # fail (\/\{?)?   (\/\{)?   (\}\/)
        # fail (\/\{)?
        # work but should fail (\/{?)?  missing \ before {
        # fail \057 -> /   \173 -> {    \175 -> }
        # should not but work \2f -> /   \7b -> {    \7d -> }
        # correct   ^\/[a-z0-9]+([A-Z]?[a-z0-9]+)*(\/\{?[a-z0-9]+([A-Z]?[a-z0-9]+)*\}?)*$
        # correct ^\057[a-z0-9]+([A-Z]?[a-z0-9]+)*(\057\173?[a-z0-9]+([A-Z]?[a-z0-9]+)*\175?)*$

  rule_4-no-trailing-slash:
    description: Paths should not end with `#/`.
    type: style
    documentationUrl: https://www.gcloud.belgium.be/rest/#resources-uri  
    message: "{{property}} should not end with `#/`"
    given: "$.paths[*]~"
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: ".+\/$" 