openapi: 3.0.0
info:
  title: REST reference implementation
  description: This is the reference implementation of a REST API following the G-Cloud style guide.
  version: v1
servers:
  - url: /demo/v1
paths:
  /myDummyPath:
    get:
      operationId: myDummyPath
      summary: Just something
      responses:
        200:
          description: all good
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Parent'
        default:
          description: problem
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  schemas:
    Problem:
      type: object
    Parent:
      $ref: '#/components/schemas/OtherSchema'
    OtherSchema:
      $ref: '#/components/schemas/Parent'