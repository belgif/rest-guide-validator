openapi: 3.0.0
info:
  title: REST reference implementation
  description: This is the reference implementation of a REST API following the G-Cloud style guide.
  version: v1
servers:
  - url: /demo/v1
paths:
  /myDummyPath:
    get:
      operationId: myDummyPath
      summary: Just something
      responses:
        200:
          description: all good
          content:
            application/json:
              schema:
        default:
          description: problem
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  schemas:
    Problem:
      type: object
    Parent:
      description: Some abstract parent
      properties:
        childType:
          type: string
      required:
        - childType
      discriminator:
        propertyName: childType
        mapping:
          child: '#/components/schemas/Child'
          otherChild: '#/components/schemas/OtherChild'
    Child:
      allOf:
        - $ref: '#/components/schemas/Parent'
      oneOf:
        - required: [someProperty]
        - required: [someOtherProperty]
      description: Some child
      properties:
        someProperty:
          type: string
        someOtherProperty:
          type: string
    OtherChild:
      allOf:
        - $ref: '#/components/schemas/Parent'
      oneOf:
        - required: [ yes ]
        - required: [ orNo ]
      description: Some child
      properties:
        yes:
          type: string
        orNo:
          type: string