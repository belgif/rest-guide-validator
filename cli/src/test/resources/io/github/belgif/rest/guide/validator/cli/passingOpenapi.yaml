openapi: 3.0.0
info:
  title: My First Api
  description: all very fancy
  version: v1
servers:
  - url: /demo/v1
paths:
  /health:
    get:
      operationId: health
      summary: health
      responses:
        200:
          description: All good
          content:
            application/json:
              schema:
                title: AllGood
                type: object
        503:
          description: Not good
          content:
            application/problem+json:
              schema:
                title: NotAllGood
                type: object
        default:
          description: default
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /myFirstPath:
    get:
      operationId: myOperation
      summary: my operation summary
      responses:
        default:
          description: my response
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  schemas:
    Problem:
      type: object