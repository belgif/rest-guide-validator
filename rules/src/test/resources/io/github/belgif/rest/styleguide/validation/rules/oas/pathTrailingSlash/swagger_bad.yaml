          schema:
            $ref: '#/definitions/Problem'
        500:
          description: Internal server error
          schema:
            $ref: '#/definitions/Problem'
      security:
        - contactData_auth:
            - scope:rsz-onss:gestion:company-data:ws-restcontactdata:update
            - scope:rsz-onss:gestion:company-data:ws-restcontactdata:cdcompanyupdate
      x-oauth2-required-scopes: any
    delete:
