openapi: "3.0.0"
info:
  version: 1.0.0
  title: Validator Test
servers:
  - url: http://myserver.com
paths: {}
components:
  schemas:
    SchemaUnderTest:
      type: object
      oneOf:
        - $ref: '#/components/schemas/SubSchemaOne'
        - $ref: '#/components/schemas/SubSchemaTwo'
      discriminator:
        propertyName: type

    ParentSchema:
      type: object
      properties:
        type:
          type: string
      required:
        - type
    SubSchemaOne:
      type: object
      properties:
        propertyOne:
          type: string
      allOf:
        - $ref: '#/components/schemas/ParentSchema'
    SubSchemaTwo:
      type: object
      properties:
        propertyOne:
          type: string
      allOf:
        - $ref: '#/components/schemas/ParentSchema'