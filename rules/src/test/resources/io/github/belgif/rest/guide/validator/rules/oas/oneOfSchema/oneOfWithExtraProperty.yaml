openapi: 3.0.1
info:
  title: TestCase
  version: '1.0'
servers:
  - url: '/api/v1'
paths:
components:
  schemas:
    SchemaUnderTest:
      oneOf:
        - $ref: '#/components/schemas/SchemaOne'
        - $ref: '#/components/schemas/SchemaTwo'
        - $ref: '#/components/schemas/SchemaThree'
      properties:
        extra:
          type: string

    Parent:
      properties:
        type:
          type: string
      discriminator:
        propertyName: type
        mapping:
          first: "#/components/schemas/SchemaOne"
          second: "#/components/schemas/SchemaTwo"
          third: "#/components/schemas/SchemaThree"

    SchemaOne:
      type: object
      allOf:
        - $ref: "#/components/schemas/Parent"
      properties:
        firstProperty:
          type: String

    SchemaTwo:
      type: object
      allOf:
        - $ref: "#/components/schemas/Parent"
      properties:
        secondProperty:
          type: String

    SchemaThree:
      type: object
      allOf:
        - $ref: "#/components/schemas/Parent"
      properties:
        thirdProperty:
          type: String