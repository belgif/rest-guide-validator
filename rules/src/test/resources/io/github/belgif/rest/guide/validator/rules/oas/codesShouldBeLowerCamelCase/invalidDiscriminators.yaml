openapi: 3.0.0
servers:
  - url: /demo/v1
paths:
  /myFirstPath:
    get:
      responses:
        200:
          description: all good
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/First'
                  - $ref: '#/components/schemas/Second'
                discriminator:
                  propertyName: type
                  mapping:
                    -first: '#/components/schemas/First'
                    ThingsSecond: '#/components/schemas/Second'
components:
  schemas:
    Sorting:
      oneOf:
        - $ref: '#/components/schemas/First'
        - $ref: '#/components/schemas/Second'
      discriminator:
        propertyName: sortType
        mapping:
          THING: '#/components/schemas/First'
          -THING: '#/components/schemas/Second'
    First:
      type: object
      properties:
        type:
          type: string
        somethingElse:
          type: integer
        sortType:
          type: string
    Second:
      type: object
      properties:
        type:
          type: string
        somethingDifferent:
          type: string
        sortType:
          type: string