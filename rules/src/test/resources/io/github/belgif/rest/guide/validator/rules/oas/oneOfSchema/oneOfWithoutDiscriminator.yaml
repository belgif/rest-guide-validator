openapi: 3.0.1
info:
  title: TestCase
  version: '1.0'
servers:
  - url: '/api/v1'
paths:
components:
  schemas:
    SchemaUnderTest:
      type: object
      properties:
        myOneOfProp:
          oneOf:
            - $ref: '#/components/schemas/SchemaFour'
            - $ref: '#/components/schemas/SchemaFive'
            - $ref: '#/components/schemas/SchemaSix'

    OtherParent:
      properties:
        type:
          type: string
          enum:
            - four
            - five
            - six
    SchemaFour:
      type: object
      allOf:
        - $ref: '#/components/schemas/OtherParent'
      properties:
        fourth:
          type: string
    SchemaFive:
      type: object
      allOf:
        - $ref: '#/components/schemas/OtherParent'
      properties:
        fifth:
          type: string
    SchemaSix:
      type: object
      allOf:
        - $ref: '#/components/schemas/OtherParent'
      properties:
        sixth:
          type: string