openapi: 3.0.1
info:
  title: TestCase
  version: '1.0'
servers:
  - url: '/api/v1'
paths:
components:
  schemas:
    SchemaUnderTest:
      discriminator:
        propertyName: type
        mapping:
          first: "#/components/schemas/SchemaOne"
      oneOf:
        - $ref: '#/components/schemas/SchemaOne'
        - required: [ someProperty ]
    SchemaOne:
      type: object
      properties:
        firstProperty:
          type: string
        type:
          type: string