            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
definitions:
  Activities:
    type: "object"
    properties:
      items:
        type: "array"
        items:
          $ref: "#/definitions/Activity"
      totalItems:
        type: "integer"
        format: "int32"
    description: "A collection of activities"
  Activity:
    type: "object"
    required:
      - "client"
      - "clientType"
      - "lastDeclarationAmounts"
      - "lastDeclarationEndDate"
      - "lastDeclarationNature"
      - "lastDeclarationStartDate"
      - "type"
      - "worker"
    properties:
      activityId:
        type: "integer"
        format: "int32"
        description: "Unique identifier of an activity"
      lastDeclarationId:
        type: "integer"
        format: "int32"
        description: "Unique identifier of the last declaration of an activity"
      type:
        type: "string"
        enum:
          - "C_2_C"
          - "O_2_C"
      lastDeclarationNature:
        description: "The nature of an activity"
        $ref: "#/definitions/Nature"
      lastDeclarationStartDate:
        type: "string"
        format: "date"
        description: "Date (yyyy-MM-dd) when the activity will begin"
      lastDeclarationEndDate:
        type: "string"
        format: "date"
        description: "Date (yyyy-MM-dd) when the activity will end"
      lastDeclarationDate:
        type: "string"
        format: "date-time"
        description: "Date-time (yyyy-MM-dd'T'HH:mm:ssXXX) when the declaration is\
          \ created"
      lastDeclarationStatus:
        type: "string"
        description: "status of a declaration"
        enum:
          - "ACCEPTED"
          - "REFUSED"
          - "CANCELLED"
          - "WARNING"
          - "PENDING"
      lastDeclarationAmounts:
        type: "array"
        items:
          $ref: "#/definitions/Amount"
        maxItems: 13
        minItems: 1
      lastDeclarationAnomalies:
        type: "array"
        items:
          $ref: "#/definitions/Anomaly"
      lastDeclarationByProfessional:
        type: "boolean"
        default: false
      declarations:
        type: "array"
        items:
          $ref: "#/definitions/Declaration"
      worker:
        description: "A citizen"
        $ref: "#/definitions/Citizen"
      client:
        type: "object"
      clientType:
        type: "string"
        enum:
          - "CITIZEN"
          - "ORGANISATION"
          - "UNINCORPORATED_ASSOCIATION"
      representative:
        description: "An organisation"
        $ref: "#/definitions/Organisation"
    description: "An activity represents a work contract in its last version between\
      \ a citizen and another citizen or between an organisation and a citizen"
  Address:
    type: "object"
    required:
      - "city"
      - "country"
      - "houseNbr"
      - "street"
      - "zipCode"
    properties:
      street:
        type: "string"
        description: "The street of the address"
      houseNbr:
        type: "string"
        description: "The house number of the address"
      postBox:
        type: "string"
        description: "The postBox of the address"
      zipCode:
        type: "string"
        description: "The zipCode of the address"
      city:
        type: "string"
        description: "The city of the address"
      country:
        type: "string"
        description: "The country of the address"
    description: "An Address"
  AddressForUIA:
    type: "object"
    required:
      - "city"
      - "countryNisCode"
      - "houseNbr"
      - "street"
      - "zipCode"
    properties:
      street:
        type: "string"
        description: "The street of the unincorporated association"
        minLength: 1
        maxLength: 100
      houseNbr:
        type: "string"
        description: "The house number of unincorporated association"
        minLength: 1
        maxLength: 11
      zipCode:
        type: "string"
        description: "The zip code of the unincorporated association"
        minLength: 1
        maxLength: 10
      city:
        type: "string"
        description: "The city of the unincorporated association"
        minLength: 1
        maxLength: 100
      cityNisCode:
        type: "integer"
        format: "int32"
        description: "The city NIS code of the unincorporated association"
      countryNisCode:
        type: "integer"
        format: "int32"
        description: "The country NIS code of the unincorporated association"
      postBox:
        type: "string"
        description: "The post box of the unincorporated association"
        minLength: 1
        maxLength: 10
    description: "JSON template for unincorporated association address management\
      \ in complementary activity webapp "
  Amount:
    type: "object"
    required:
      - "amount"
      - "endDate"
      - "startDate"
    properties:
      amount:
        type: "number"
        description: "The amount"
      startDate:
        type: "string"
        format: "date"
        description: "The start date of the work relative to the amount"
      endDate:
        type: "string"
        format: "date"
        description: "The end date of the work relative to the amount"
      anomalies:
        type: "array"
        items:
          $ref: "#/definitions/Anomaly"
    description: "An amount that the worker receive in exchange of his services"
  Anomaly:
    type: "object"
    required:
      - "code"
      - "label"
      - "severity"
    properties:
      code:
        type: "string"
        description: "The code of the anomaly"
      label:
        description: "Common type defined to provide a string value for each supported\
          \ language among nl, fr, de"
        $ref: "#/definitions/Label"
      severity:
        type: "string"
        description: "The severity of the anomaly"
        enum:
          - "BLOCKING"
          - "WARNING"
    description: "An anomaly"
  ApplicationParameters:
    type: "object"
    description: "Parameters for the application ComplementaryActivity"
  Cities:
    type: "object"
    properties:
      items:
        type: "array"
        items:
          $ref: "#/definitions/city"
      totalItems:
        type: "integer"
        format: "int32"
    description: "A collection of cities"
  Citizen:
    type: "object"
    properties:
      citizenId:
        type: "integer"
        format: "int32"
        description: "The unique identifier of a citizen"
      ssin:
        type: "string"
        description: "A number that identifies a person. Also known as NISS, INSZ\
          \ or INSS"
        pattern: "^\\d{11}$"
      midInfos:
        description: "The additionnal infos concerning a Citizen"
        $ref: "#/definitions/CitizenMid"
    description: "A citizen"
  CitizenMid:
    type: "object"
    required:
      - "address"
      - "birthDate"
      - "birthPlace"
      - "firstName"
      - "gender"
      - "lastName"
    properties:
      lastName:
        type: "string"
        description: "Last name of a citizen"
      firstName:
        type: "string"
        description: "First name of a citizen"
      birthDate:
        type: "string"
        format: "date"
        description: "Birth date of a citizen"
      birthPlace:
        type: "string"
        description: "Birth place of a citizen"
      gender:
        type: "string"
        description: "Gender of a citizen"
        enum:
          - "M"
          - "F"
      address:
        description: "An Address"
        $ref: "#/definitions/Address"
    description: "The additionnal infos concerning a Citizen"
  CitizenQuotaSummary:
    type: "object"
    description: "The agregated view of the quota of a citizen"
  CitizenWhiteList:
    type: "object"
    required:
      - "citizen"
    properties:
      citizen:
        description: "Citizen for white List"
        $ref: "#/definitions/Citizen_"
      periods:
        type: "array"
        items:
          $ref: "#/definitions/CitizenWhiteListPeriod"
    description: "The entry of a citizen on the citizen_whitelist with the periods\
      \ for which a citizen must be allowed to perform complementary activities"
  CitizenWhiteListPeriod:
    type: "object"
    properties:
      periodId:
        type: "integer"
        format: "int32"
        description: "The id of the period"
      startDate:
        type: "string"
        format: "date"
      endDate:
        type: "string"
        format: "date"
      creationDate:
        type: "string"
        format: "date-time"
      reasonCreate:
        type: "string"
      srNumberCreate:
        type: "string"
      reasonCancel:
        type: "string"
      cancelDate:
        type: "string"
        format: "date-time"
      srNumberCancel:
        type: "string"
    description: "The periods for which a citizen is added to the citizen whitelist"
  Citizen_:
    type: "object"
    required:
      - "citizenEditable"
      - "lastName"
      - "ssin"
    properties:
      ssin:
        type: "string"
        description: "A number that identifies a person. Also known as NISS, INSZ\
          \ or INSS"
        pattern: "^\\d{11}$"
      lastName:
        type: "string"
        description: "Last name of a citizen"
      firstName:
        type: "string"
        description: "First name of a citizen"
      citizenEditable:
        type: "boolean"
        default: false
    description: "Citizen for white List"
  CityName:
    type: "object"
    properties:
      language:
        type: "string"
        description: "Language of the cityName"
        enum:
          - "FR"
          - "NL"
          - "DE"
      cityName:
        type: "string"
        description: "name of the city in language from the cbezipcode reference table"
        minLength: 1
        maxLength: 100
  Component:
    type: "object"
    required:
      - "name"
      - "version"
    properties:
      name:
        type: "string"
        xml:
          name: "Name"
      version:
        type: "string"
        xml:
          name: "Version"
      mavenReference:
        xml:
          name: "MavenReference"
        $ref: "#/definitions/MavenReference"
      catalogPart:
        type: "string"
        xml:
          name: "CatalogPart"
      extensions:
        xml:
          name: "Extensions"
        $ref: "#/definitions/Extensions"
  Declaration:
    type: "object"
    required:
      - "amounts"
      - "declarationId"
      - "endDate"
      - "startDate"
      - "status"
    properties:
      declarationId:
        type: "integer"
        format: "int32"
        description: "Unique identifier of a declaration"
      status:
        type: "string"
        description: "status of a declaration"
        enum:
          - "ACCEPTED"
          - "REFUSED"
          - "CANCELLED"
          - "WARNING"
          - "PENDING"
      startDate:
        type: "string"
        format: "date"
        description: "Date (yyyy-MM-dd) when the activity will begin"
      endDate:
        type: "string"
        format: "date"
        description: "Date (yyyy-MM-dd) when the activity will end"
      creationDate:
        type: "string"
        format: "date-time"
        description: "Date-time (yyyy-MM-dd'T'HH:mm:ssXXX) when the declaration is\
          \ created"
      nature:
        description: "The nature of an activity"
        $ref: "#/definitions/Nature"
      amounts:
        type: "array"
        items:
          $ref: "#/definitions/Amount"
      anomalies:
        type: "array"
        items:
          $ref: "#/definitions/Anomaly"
    description: "A declaration is the part of an activity that can be modified"
  ErrorMessage:
    type: "object"
    required:
      - "creationDate"
      - "id"
      - "objectId"
      - "properties"
      - "queue"
    properties:
      id:
        type: "integer"
        format: "int32"
        description: "Unique identifier of an error message"
      creationDate:
        type: "string"
        format: "date-time"
        description: "Date-time (yyyy-MM-dd'T'HH:mm:ssXXX) when the message is created"
      queue:
        type: "string"
        enum:
          - "ACTIVITY_QUEUE"
      objectId:
        type: "integer"
        format: "int32"
        description: "Unique identifier of the object of the message (Eg. : activity\
          \ id)'"
      stacktrace:
        type: "object"
        description: "Exception stacktrace"
      properties:
        type: "array"
        items:
          $ref: "#/definitions/Property"
