---
swagger: "2.0"
info:
  description: "This is the implementation of compact REST API"
  version: "${artifact.version}"
  title: "Complementary Activity - WEB API"
  contact:
    name: "Compact team"
    url: "www.smals.be"
    email: "CompactDevelopers@smals.be"
basePath: "/"
tags:
  - name: "Activity"
  - name: "CitizenQuotaSummary"
  - name: "CitizenWhiteList"
  - name: "City"
  - name: "ControlAdditionalWork"
  - name: "Documentation"
  - name: "Error Message"
  - name: "Monitoring"
  - name: "Organisations"
  - name: "ReferenceData"
  - name: "UnincorporatedAssociation"
schemes:
  - "http"
securityDefinitions:
  oauth_implicit:
    type: oauth2
    authorizationUrl: 'https://oauth-v4.int.ext.socialsecurity.be/oauth2/authorize'
    flow: implicit
    scopes:
      'scope:complementary:activities:entreprise:declare': this scope is for the enterprises to declare an activity
      'scope:complementary:activities:citizen:declare': this scope is for the citizen to declare an activity
      'scope:complementary:activities:representative:declare': this scope is for the mandatarians to declare an activity
      'scope:complementary:activities:professional:consult': this scope is for the professional agents to consult an activity
      'scope:complementary:activities:professional:declare': this scope is for the professional agents to declare an activity
      'scope:rsz-onss:declaration:rest:complementaryactivity:monitoring': this scope is for monitoring
  oauth_clientCredentials:
    type: oauth2
    tokenUrl: 'https://professionalservices-int.socialsecurity.be/REST/oauth/v4/token'
    flow: application
    scopes:
      'scope:complementary:activities:entreprise:declare': this scope is for the enterprises to declare an activity
      'scope:complementary:activities:citizen:declare': this scope is for the citizen to declare an activity
      'scope:complementary:activities:representative:declare': this scope is for the mandatarians to declare an activity
      'scope:complementary:activities:professional:consult': this scope is for the professional agents to consult an activity
      'scope:complementary:activities:professional:declare': this scope is for the professional agents to declare an activity
      'scope:rsz-onss:declaration:rest:complementaryactivity:monitoring': this scope is for monitoring
  oauth_accessCode:
    type: oauth2
    tokenUrl: 'https://professionalservices-int.socialsecurity.be/REST/oauth/v4/token'
    authorizationUrl: 'https://oauth-v4.int.ext.socialsecurity.be/oauth2/authorize'
    flow: accessCode
    scopes:
      'scope:complementary:activities:entreprise:declare': this scope is for the enterprises to declare an activity
      'scope:complementary:activities:citizen:declare': this scope is for the citizen to declare an activity
      'scope:complementary:activities:representative:declare': this scope is for the mandatarians to declare an activity
      'scope:complementary:activities:professional:consult': this scope is for the professional agents to consult an activity
      'scope:complementary:activities:professional:declare': this scope is for the professional agents to declare an activity
      'scope:rsz-onss:declaration:rest:complementaryactivity:monitoring': this scope is for monitoring
paths:
  /:
    get:
      tags:
        - "Documentation"
      summary: "Return the API swagger document"
      description: ""
      operationId: "getRootApi"
      parameters: [ ]
      responses:
        200:
          description: "OK"
      security: [ ]
  /activities:
    post:
      tags:
        - "Activity"
      summary: "Create a new activity"
      description: ""
      operationId: "postCreateActivity"
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "activity"
          description: "The activity to create"
          required: true
          schema:
            $ref: "#/definitions/Activity"
        - name: "bypassControls"
          in: "query"
          description: "Indication whether or not controls must be bypassed (for professional\
          \ users only)"
          required: false
          type: "boolean"
          default: false
      responses:
        201:
          description: "Activity created"
        400:
          description: "Bad request"
        401:
          description: "Not authorized"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /activities/byCitizen/{ssin}:
    get:
      tags:
        - "Activity"
      summary: "Get activities by citizen"
      description: ""
      operationId: "getActivitiesByCitizen"
      produces:
        - "application/json"
      parameters:
        - name: "language"
          in: "query"
          description: "The language of the connected user"
          required: false
          type: "string"
        - name: "ssin"
          in: "path"
          description: "The SSIN of the citizen for whom to retrieve the activities"
          required: true
          type: "string"
        - name: "uia"
          in: "query"
          description: "Indication whether or not activities are retrieved for an unincorporated\
          \ association"
          required: false
          type: "boolean"
          default: false
        - name: "page"
          in: "query"
          description: "The page to retrieve"
          required: false
          type: "integer"
          default: 1
          minimum: 1.0
          format: "int32"
        - name: "pageSize"
          in: "query"
          description: "The number of items per page to retrieve"
          required: false
          type: "integer"
          default: 20
          minimum: 1.0
          format: "int32"
        - name: "client"
          in: "query"
          description: "Filter activities for a specific client"
          required: false
          type: "string"
        - name: "worker"
          in: "query"
          description: "Filter activities for a specific worker"
          required: false
          type: "string"
        - name: "association"
          in: "query"
          description: "Filter activities for an unincorporated association"
          required: false
          type: "string"
        - name: "startDate"
          in: "query"
          description: "Filter activities starting from this date"
          required: false
          type: "string"
        - name: "endDate"
          in: "query"
          description: "Filter activities up until this date"
          required: false
          type: "string"
        - name: "type"
          in: "query"
          description: "Filter activities for a specific type"
          required: false
          type: "string"
        - name: "nature"
          in: "query"
          description: "Filter activities for a specific nature (specified by the ID\
          \ of the nature"
          required: false
          type: "integer"
          format: "int32"
        - name: "withHistory"
          in: "query"
          description: "Indication whether or not declarations are retrieved with activities"
          required: false
          type: "boolean"
        - name: "sort"
          in: "query"
          description: "Sort the activities by ascending value for the specified properties\
          \ separated by a comma, prefix the property name with a dash (ie. '-client')\
          \ for descending order"
          required: false
          type: "string"
          default: "-startDate"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/Activities"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /activities/byOrganisation/{enterpriseNbr}:
    get:
      tags:
        - "Activity"
      summary: "Get activities by enterprise"
      description: ""
      operationId: "getActivitiesByOrganisation"
      produces:
        - "application/json"
      parameters:
        - name: "language"
          in: "query"
          description: "The language of the connected user"
          required: false
          type: "string"
        - name: "enterpriseNbr"
          in: "path"
          description: "The identification number of the organisation for which to retrieve\
          \ the activities"
          required: true
          type: "string"
        - name: "page"
          in: "query"
          description: "The page to retrieve"
          required: false
          type: "integer"
          default: 1
          minimum: 1.0
          format: "int32"
        - name: "pageSize"
          in: "query"
          description: "The number of items per page to retrieve"
          required: false
          type: "integer"
          default: 20
          minimum: 1.0
          format: "int32"
        - name: "worker"
          in: "query"
          description: "Filter activities for a specific worker"
          required: false
          type: "string"
        - name: "startDate"
          in: "query"
          description: "Filter activities starting from this date"
          required: false
          type: "string"
        - name: "endDate"
          in: "query"
          description: "Filter activities up until this date"
          required: false
          type: "string"
        - name: "type"
          in: "query"
          description: "Filter activities for a specific type"
          required: false
          type: "string"
        - name: "nature"
          in: "query"
          description: "Filter activities for a specific nature (specified by the ID\
          \ of the nature"
          required: false
          type: "integer"
          format: "int32"
        - name: "withHistory"
          in: "query"
          description: "Indication whether or not declarations are retrieved with activities"
          required: false
          type: "boolean"
        - name: "sort"
          in: "query"
          description: "Sort the activities by ascending value for the specified properties\
          \ separated by a comma, prefix the property name with a dash (ie. '-client')\
          \ for descending order"
          required: false
          type: "string"
          default: "-startDate"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/Activities"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /activities/{id}:
    get:
      tags:
        - "Activity"
      summary: "Get an activity"
      description: ""
      operationId: "getActivity"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the activity to retrieve"
          required: true
          type: "integer"
          format: "int32"
        - name: "withHistory"
          in: "query"
          description: "Indication whether or not declarations are retrieved with activities"
          required: false
          type: "boolean"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/Activity"
        401:
          description: "Not authorized"
        404:
          description: "No activity found for the given ID"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
    patch:
      tags:
        - "Activity"
      summary: "Update an activity"
      description: ""
      operationId: "patchActivity"
      consumes:
        - "application/merge-patch+json"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the activity to update"
          required: true
          type: "integer"
          format: "int32"
        - name: "The type of update to apply "
          in: "query"
          required: false
          type: "string"
          enum:
            - "cancel"
            - "update"
        - name: "bypassControls"
          in: "query"
          description: "Bypasses some validations, only valid if the user is a professional."
          required: false
          type: "boolean"
          default: false
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/Activity"
        401:
          description: "Not authorized"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /api/alive:
    get:
      tags:
        - "Monitoring"
      summary: "Check liveness of this REST API"
      description: ""
      operationId: "getApiAlive"
      parameters: [ ]
      responses:
        200:
          description: "successful operation"
          schema:
            type: "string"
      security: [ ]
  /api/healthCheck:
    get:
      tags:
        - "Monitoring"
      summary: "Check health of this REST API"
      description: "This resource is only available to supervision users"
      operationId: "getApiHealthCheck"
      produces:
        - "text/xml; charset=UTF-8"
      parameters:
        - name: "type"
          in: "query"
          description: "Defines the which sanity checks must be ran"
          required: false
          type: "string"
          default: "default"
          enum:
            - "ping"
            - "default"
            - "deep"
      responses:
        200:
          description: "successful operation"
          schema:
            $ref: "#/definitions/HealthCheckResponse"
      security: [ ]
  /apidoc/html:
    get:
      tags:
        - "Documentation"
      summary: "Returns the apidoc.html, human friendly file describing the service"
      description: ""
      operationId: "getApiDocHtml"
      produces:
        - "text/html"
      parameters: [ ]
      responses:
        200:
          description: "OK"
      security: [ ]
  /apidoc/swagger.json:
    get:
      tags:
        - "Documentation"
      summary: "Returns the swagger.json file describing the service"
      description: ""
      operationId: "getApiDocSwagger"
      produces:
        - "application/json"
      parameters: [ ]
      responses:
        200:
          description: "OK"
      security: [ ]
  /cities:
    get:
      tags:
        - "City"
      summary: "Get cities"
      description: ""
      operationId: "getCities"
      produces:
        - "application/json"
      parameters:
        - name: "zipCode"
          in: "query"
          required: false
          type: "string"
        - name: "city"
          in: "query"
          required: false
          type: "string"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/Cities"
        401:
          description: "Not authorized"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /citizenQuotaSummary:
    get:
      tags:
        - "CitizenQuotaSummary"
      summary: "Get the quota summary for a citizen"
      description: ""
      operationId: "getCitizenQuotaSummary"
      produces:
        - "application/json"
      parameters:
        - name: "ssin"
          in: "query"
          description: "The SSIN of the citizen for whom to retrieve the quota summary"
          required: true
          type: "string"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/CitizenQuotaSummary"
        401:
          description: "Not authorized"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:professional:consult'
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /citizenwhitelist/byCitizen/{ssin}:
    get:
      tags:
        - "CitizenWhiteList"
      summary: "Get CitizenWhiteList by ssin"
      description: ""
      operationId: "getCitizenwhitelistByCitizen"
      produces:
        - "application/json"
      parameters:
        - name: "ssin"
          in: "path"
          description: "The SSIN of the citizen for whom to retrieve the whiteList periods"
          required: true
          type: "string"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/CitizenWhiteList"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /citizenwhitelist/{id}:
    get:
      tags:
        - "CitizenWhiteList"
      summary: "Get a period"
      description: ""
      operationId: "getCitizenwhitelist"
      produces:
        - "application/json"
      parameters:
        - name: "id"
          in: "path"
          description: "ID of the period to retrieve"
          required: true
          type: "integer"
          format: "int32"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/CitizenWhiteListPeriod"
        401:
          description: "Not authorized"
        404:
          description: "No Period found for the given ID"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /citizenwhitelist/{ssin}/periods:
    post:
      tags:
        - "CitizenWhiteList"
      summary: "create a new citizenwhitelist"
      description: ""
      operationId: "postCitizenwhitelistPeriods"
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - name: "ssin"
          in: "path"
          description: "an citizenwhitelist"
          required: true
          type: "string"
      responses:
        201:
          description: "ADDED"
        400:
          description: "BAD_REQUEST"
        401:
          description: "UNAUTHORIZED"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /citizenwhitelist/{ssin}/periods/{id}:
    patch:
      tags:
        - "CitizenWhiteList"
      summary: "Cancel an period"
      description: ""
      operationId: "patchCitizenwhitelistPeriods"
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - name: "ssin"
          in: "path"
          description: "ID of the CitizenWhiteList to cancel"
          required: true
          type: "string"
        - name: "id"
          in: "path"
          required: true
          type: "integer"
          format: "int32"
        - name: "The type of cancel to apply "
          in: "query"
          required: false
          type: "string"
          enum:
            - "cancel"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/CitizenWhiteListPeriod"
        401:
          description: "Not authorized"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:professional:declare'
      x-oauth2-required-scopes: any
  /controladditionalwork/{ssin}:
    get:
      tags:
        - "ControlAdditionalWork"
      summary: "Check if worker can do complementary activities."
      description: ""
      operationId: "getControladditionalwork"
      produces:
        - "application/json"
      parameters:
        - name: "ssin"
          in: "path"
          description: "The SSIN of the worker to check if he's allowed to do complementary\
          \ activities."
          required: true
          type: "string"
        - name: "companyId"
          in: "query"
          description: "CompanyId if of the organisation in case of an o2c"
          required: false
          type: "string"
        - name: "startDate"
          in: "query"
          description: "Starting date of the activity"
          required: true
          type: "string"
        - name: "endDate"
          in: "query"
          description: "End date of the activity"
          required: true
          type: "string"
      responses:
        200:
          description: "OK"
      security:
        - oauth_implicit:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_clientCredentials:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
            - 'scope:complementary:activities:professional:declare'
        - oauth_accessCode:
            - 'scope:complementary:activities:entreprise:declare'
            - 'scope:complementary:activities:citizen:declare'
            - 'scope:complementary:activities:representative:declare'
