          - "INT"
          - "TST"
          - "DEV"
          - "SIC"
          - "LOCAL"
          - "OTHER"
      host:
        type: "string"
        xml:
          name: "Host"
      port:
        type: "integer"
        format: "int32"
        xml:
          name: "Port"
      name:
        type: "string"
        xml:
          name: "Name"
      url:
        type: "string"
        xml:
          name: "URL"
      extensions:
        xml:
          name: "Extensions"
        $ref: "#/definitions/Extensions"
  MavenReference:
    type: "object"
    properties:
      groupId:
        type: "string"
