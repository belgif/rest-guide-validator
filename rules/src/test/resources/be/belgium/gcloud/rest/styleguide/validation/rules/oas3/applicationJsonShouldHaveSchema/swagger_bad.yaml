---
swagger: "2.0"
info:
  description: Service that manages the non-formal contact data (email, phone) of companies.
  version: "${artifact.version}"
  title: contactData
  contact:
    email: contactDataTeam@smals.be
basePath: /REST/contactData/v1
schemes:
  - https
paths:
  /userInfo:
    get:
      tags:
        - user
      summary: Get connected user's info
      description: Get the user's info of the connected user like the scopes
      operationId: getUserInfo
      produces:
        - application/json
        - application/problem+json
      responses:
        200:
          description: successful operation
          schema:
            type: array
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        500:
          description: Internal server error
        default:
          description: default response