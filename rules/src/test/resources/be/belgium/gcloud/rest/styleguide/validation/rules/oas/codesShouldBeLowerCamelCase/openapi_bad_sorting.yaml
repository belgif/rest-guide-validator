openapi: 3.0.0
info:
  title: Non-Working testcase for CodesShouldBeLowerCamelCase
  description: This is the reference implementation of a REST API following the G-Cloud
    style guide.
  version: v1
servers:
  - url: /demo/v1
tags:
  - name: ReferenceData
  - name: Organization
  - name: Employer
  - name: Logos
  - name: Documentation
  - name: Monitoring
paths:
  /myFirstPath:
    get:
      tags:
        - ReferenceData
      summary: Get the complete reference data list of employer classes
      operationId: getEmployerClasses
      parameters:
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/SortingEnum'
        - name: BadSJORT
          in: query
          schema:
            type: string
            enum:
              - "email"
              - "date"
              - "modificationDate"
              - "-email"
              - "-date"
              - "-modificationDate"
      responses:
        default:
          description: a problem
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/SomethingWithEnum'
components:
  schemas:
    SortingEnum:
      type: string
      enum:
        - "email"
        - "date"
        - "modificationDate"
        - "-Email"
        - "-Date"
        - "-ModificationDate"
