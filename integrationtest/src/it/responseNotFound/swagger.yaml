        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consult'
      x-oauth2-required-scopes: any
    post:
      tags:
      - "Request"
      summary: "Create a new request, returns the id and schedules (async) it for\
        \ process creation with uri to request"
      description: ""
      operationId: "createRequest"
      consumes:
      - "application/json"
      parameters:
