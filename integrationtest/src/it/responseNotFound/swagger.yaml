      description: "This resource is only available to supervision users"
      operationId: "healthCheck"
      produces:
      - "text/xml"
      parameters:
      - name: type
        in: "query"
        description: "Defines the which sanity checks must be ran"
        required: false
        type: "string"
        default: "default"
      responses:
        200:
          description: "successful operation"
        default:
