      - { }
      x-oauth2-required-scopes: any
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/EnterpriseInformation"
        default:
          $ref: "#/definitions/Problem"
  /healthCheck:
    get:
      tags:
