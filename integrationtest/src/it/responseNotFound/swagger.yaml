swagger: "2.0"
info:
  description: "This is the implementation of nssoservicerequest REST API"
  version: "v2"
  title: "nssoservicerequest API"
  contact:
    name: "NssoServiceRequest team"
    url: "http://www.smals.be"
    email: "overseas_dev@smals.be"
basePath: "/nssoservicerequest/v2"
tags:
- name: "Companies registries"
- name: "Documentation"
- name: "Monitoring"
- name: "Request"
- name: "Template"
schemes:
- "http"
securityDefinitions:
  oauth-implicit:
    type: oauth2
    authorizationUrl: 'https://oauth-v5.socialsecurity.be/oauth2/authorize'
    flow: implicit
    scopes:
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultenterprise': "consultenterprise"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultagent': "consultagent"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postall': "postall"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postcitizen': "postcitizen"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultcitizen': "consultcitizen"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultagentall': "consultagentall"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postrepresentative': "postrepresentative"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postenterprise': "postenterprise"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postagent': "postagent"
      'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:monitoring': "monitoring"
