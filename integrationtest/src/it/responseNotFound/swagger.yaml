      - "Documentation"
      summary: "Returns the API documentation in YAML Swagger format"
      description: ""
      operationId: "getSwagger"
      produces:
      - "application/yaml"
      parameters: []
      responses:
        200:
          description: "successful operation"
        default:
          $ref: "#/definitions/Problem"
  /enterprises/{companyId}:
    get:
      tags:
      - "Companies registries"
      summary: "Return enterprise data corresponding to the company Id"
      description: ""
      operationId: "getEnterpriseDenominations"
      produces:
      - "application/json"
      parameters:
      - name: "companyId"
        in: "path"
        required: true
        type: "integer"
        format: "int64"
      security:
      - oauth-implicit:
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultenterprise'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultagent'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postall'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postcitizen'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultcitizen'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultagentall'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postrepresentative'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postenterprise'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:postagent'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:monitoring'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultrepresentative'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consultall'
        - 'scope:socialsecurity:gestion:entreprise:nssoservicerequest-rest:consult'
      - { }
      x-oauth2-required-scopes: any
      responses:
        200:
          description: "OK"
        204:
          description: "no content"
        default:
          $ref: "#/definitions/Problem"
  /enterprises/info/{companyId}:
    get:
      tags:
      - "Companies registries"
      summary: "Return enterprise data corresponding to the company Id"
      description: ""
      operationId: "getEnterpriseInformations"
      produces:
      - "application/json"
      parameters:
      - name: "companyId"
        in: "path"
        required: true
        type: "integer"
        format: "int64"
      - name : "WithBU"
        in: "query"
        required: false
        type: "boolean"
