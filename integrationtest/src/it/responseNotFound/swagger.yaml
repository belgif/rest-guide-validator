definitions:
  FormReport:
    type: "string"
    format: "binary"
  EventSectorStatus:
    type: "object"
    required:
    - "enterpriseNumber"
    - "status"
    properties:
      enterpriseNumber:
        type: "string"
      status:
        type: "string"

  Labels:
    type: "object"
    properties:
      fr:
        type: "string"
      nl:
        type: "string"
      de:
        type: "string"
      en:
        type: "string"
  LoginProfile:
    type: "object"
    properties:
      enterprise:
        type: "boolean"
      citizen:
        type: "boolean"
      nssoAgent:
        type: "boolean"
  MTCaptchaResponse:
    type: "object"
    properties:
      success:
        type: "boolean"
      failCodes:
        type: "array"
        items:
          type: "string"
          enum:
          - "ExpiredToken"
          - "DuplicateToken"
          - "BadRequest"
          - "MissingPrivateKey"
          - "InvalidPrivateKey"
          - "MissingToken"
          - "InvalidToken"
          - "InvalidTokenFailedDecryption"
          - "PrivateKeyMismatchToken"
          - "ExpiredSiteKeyOrAccount"
      tokenInfo:
        $ref: "#/definitions/MTTokenInfo"
  MTTokenInfo:
    type: "object"
    properties:
      v:
        type: "string"
      code:
        type: "integer"
        format: "int32"
      codeDesc:
        type: "string"
      tokId:
        type: "string"
      timestampSec:
        type: "integer"
        format: "int64"
      timestampIso:
        type: "string"
      hostname:
        type: "string"
      isDevHost:
        type: "boolean"
      action:
        type: "string"
      ip:
        type: "string"
  ServiceRequest:
    type: "object"
    properties:
      formId:
        type: "string"
      id:
        type: "string"
      requester:
        $ref: "#/definitions/ServiceRequester"
      type:
        type: "string"
        description: "REQUESTHARMATTESTPUBLICTENDER, REQUESTHARMATTESTPUBLICTENDERMULTIPLE,\
          \ REQUESTHARMATTESTPUB, REQUESTHARMATTESTDEBT"
      typeVersion:
        type: "string"
      createDate:
        type: "string"
        format: "date-time"
      updateDate:
        type: "string"
        format: "date-time"
      data:
        type: "object"
      metaData:
        type: "object"
        additionalProperties:
          type: "object"
      functionalStatus:
        type: "string"
        enum:
        - "SUBMITTED"
        - "NEW"
        - "ERROR"
        - "CLOSED_NOK"
        - "CLOSED_OK"
        - "CANCELLED"
        - "IN_PROGRESS"
        - "DRAFT"
      isDraft:
        type: boolean
      isEdit:
        type: boolean
      concerned:
        $ref: "#/definitions/ServiceRequester"
      sendMail:
        type: "string"
      serviceRequestType:
        $ref: "#/definitions/ServiceRequestType"

  ServiceRequestTypes:
    type: "object"
    properties:
      items:
        type: "array"
        items:
          $ref: "#/definitions/ServiceRequestType"
      page:
        type: "integer"
        format: "int32"
      pageSize:
        type: "integer"
        format: "int32"
      total:
        type: "integer"
        format: "int32"

  ServiceRequestType:
    type: "object"
    description: 'definition of a form type: name, css style, access type, mail response, utilisation mode (edit/draft), ...'
    properties:
      id:
        type: "string"
      secured:
        type: "boolean"
      scope:
        type: "string"
      scopeSubmit:
        type: "array"
        items:
          type: "string"
      scopeConsult:
        type: "array"
        items:
          type: "string"
      roleSubmit:
        type: "array"
        items:
          type: "string"
      roleConsult:
        type: "array"
        items:
          type: "string"
      style:
        type: "string"
      languages:
        type: "array"
        description: A language represented by an ISO-639-1 code
        items:
          type: "string"
          pattern: "^[a-z]{2}$"
          example: "en"
      autoCleanup:
        type: "boolean"
      nbDaysRetention:
        type: "integer"
      label:
        $ref: "#/definitions/Labels"
      loginProfiles:
        $ref: "#/definitions/LoginProfile"
      confirmationMessages:
        $ref: "#/definitions/Labels"
      summaryMessages:
        $ref: "#/definitions/Labels"
      mailContent:
        $ref: "#/definitions/Labels"
      mailContentUnsecured:
        $ref: "#/definitions/Labels"
      mailSubject:
        $ref: "#/definitions/Labels"
      editableMode:
        type: "boolean"
      consultAccess:
        type: "string"
      postAcces:
        type: "string"
      mailFrom:
        type: "string"
      sendMail:
        type: "boolean"
      pdfDownload:
        type: "boolean"
      pdfMailSecured:
        type: "boolean"
      pdfMailUnsecured:
        type: "boolean"
      draftMode:
        type: "boolean"
      redirectionUrl:
        type: "string"
      consultAccessCreator:
        type: "boolean"
      consultView:
        type: "boolean"


  ServiceRequester:
    type: "object"
    properties:
      ssin:
        type: "string"
      enterpriseNumber:
        type: "string"
      firstname:
        type: "string"
      lastname:
        type: "string"
      requesterType:
        type: "string"
  ServiceRequests:
    type: "object"
    properties:
      requestList:
        type: "array"
        items:
          $ref: "#/definitions/ServiceRequest"
      page:
        type: "integer"
        format: "int32"
      pageSize:
        type: "integer"
        format: "int32"
      total:
        type: "integer"
        format: "int32"
  UnauthorizedInfo:
    type: "object"
    properties:
      reason:
        type: "string"
        enum:
        - "FailedCaptcha"
        - "MissingCaptcha"
        - "NoAuthentificatedUserForSecuredForm"
      mtCaptchaResponse:
        $ref: "#/definitions/MTCaptchaResponse"
  DacStatus:
    type: "object"
    properties:
      enterpriseNumber:
        type: "string"
      hasAccess:
        type: "boolean"
  EnterpriseInformation:
    type: "object"
    properties:
      CompanyID:
        type: "string"
        description: "The ID of the company"
      EnterpriseStatus:
        $ref: '#/definitions/EnterpriseStatus'
      EnterpriseDuration:
        type: "integer"
        description: "Value '0'"
      EnterpriseType:
        type: "integer"
        description: "The type of the enterprise: 1 = personne physique, 2 = personne morale"
      LegalDenomination:
        type: "array"
        items:
          $ref: '#/definitions/LegalDenomination'
      CBEAddresses:
        type : "array"
        items:
          $ref: '#/definitions/CBEAddress'
      JuridicalSituation:
        $ref: '#/definitions/JuridicalSituation'
